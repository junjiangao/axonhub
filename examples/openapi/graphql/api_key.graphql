mutation CreateAPIKey($name: String!) {
  createLLMAPIKey(name: $name) {
    id
    key
    name
    scopes
  }
}

mutation UpdateAPIKeyProfiles($id: ID!, $input: UpdateAPIKeyProfilesInput!) {
  updateAPIKeyProfiles(id: $id, input: $input) {
    id
    key
    name
    scopes
    profiles {
      activeProfile
      profiles {
        name
        modelMappings {
          from
          to
        }
        channelIDs
        channelTags
        channelTagsMatchMode
        modelIDs
        loadBalanceStrategy
      }
    }
  }
}

mutation LoadApiKeyProfileTemplate($input: LoadApiKeyProfileTemplateInput!) {
  loadApiKeyProfileTemplate(input: $input) {
    id
    key
    name
    scopes
    profiles {
      activeProfile
      profiles {
        name
        modelMappings {
          from
          to
        }
        channelIDs
        channelTags
        channelTagsMatchMode
        modelIDs
        loadBalanceStrategy
      }
    }
  }
}

# Provide exactly one of $apiKeyId or $key. Requires the read_api_keys scope and
# only returns usage for keys inside the service account's own project.
query APIKeyQuotaUsages($apiKeyId: ID, $key: String) {
  apiKeyQuotaUsages(apiKeyId: $apiKeyId, key: $key) {
    profileName
    window {
      start
      end
    }
    usage {
      requestCount
      totalTokens
      totalCost
    }
  }
}
